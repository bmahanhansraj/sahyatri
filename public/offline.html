<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sahyatri — offline</title>
<style>
  @font-face { font-family:'Ancorli'; src:url('/fonts/Ancorli.ttf') format('truetype'); }
  body { margin:0; min-height:100vh; display:grid; place-items:center; background:#FBF8F0; color:#1A1508; font-family:system-ui,sans-serif; text-align:center; padding:24px; }
  img { height:34px; margin-bottom:20px; }
  h1 { font-family:'Ancorli',system-ui; font-size:22px; margin:0 0 8px; }
  p { color:#6b6252; max-width:34ch; margin:0 auto 20px; line-height:1.5; }
  button { background:#E7AF24; border:0; color:#1A1508; font-weight:600; padding:12px 22px; border-radius:10px; font-size:15px; cursor:pointer; }
</style>
</head>
<body>
<div>
  <img src="/logo.svg" alt="Sahyatri">
  <h1>You're offline</h1>
  <p>Sahyatri needs a connection to search and book rides. We'll be right here when you're back on the road.</p>
  <button onclick="location.reload()">Try again</button>
</div>
</body>
</html>
