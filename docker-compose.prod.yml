# Production stack for a single AWS Lightsail/EC2 server.
#   1. copy .env.production.example to .env and edit it
#   2. docker compose -f docker-compose.prod.yml up -d
# Includes: PostgreSQL (persistent volume), one-time DB init, the app,
# and Caddy for automatic HTTPS once you point your domain at the server.
services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: sahyatri
      POSTGRES_PASSWORD: VkhpPwBIppCRQcXwCS0VvyPgwKjajw1mTGKZ0veRc30=
      POSTGRES_DB: sahyatri
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sahyatri"]
      interval: 5s
      retries: 12

  db-init:
    build:
      context: .
      target: builder
    command: sh -c "npx prisma db push && npx tsx prisma/seed.ts || true"
    environment:
      DATABASE_URL: postgresql://sahyatri:VkhpPwBIppCRQcXwCS0VvyPgwKjajw1mTGKZ0veRc30=@db:5432/sahyatri
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    restart: always
    environment:
      DATABASE_URL: postgresql://sahyatri:VkhpPwBIppCRQcXwCS0VvyPgwKjajw1mTGKZ0veRc30=@db:5432/sahyatri
      AUTH_SECRET: 3ad09859ee21cd8c18255666957c5d4c86450b7071b60508f442a9a200027e0f
      RAZORPAY_KEY_ID: rzp_live_T1QqJn7nqCB4re
      RAZORPAY_KEY_SECRET: 0kt4Jk4K4Qj4p0axUsrRCxf7
      TWOFACTOR_API_KEY: 15a447f5-6cdb-11e5-9a14-00163ef91450
      DIGILOCKER_CLIENT_ID: ${DIGILOCKER_CLIENT_ID:-}
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q true"]
      interval: 15s
      retries: 5

  # Automatic HTTPS. Set DOMAIN in .env once your DNS points here;
  # leave it as :80 to serve plain HTTP on the server's IP while testing.
  caddy:
    image: caddy:2-alpine
    restart: always
    ports: ["80:80", "443:443"]
    environment:
      DOMAIN: sahyatri.online
    command: sh -c 'echo "$$DOMAIN { reverse_proxy app:3000 }" > /etc/caddy/Caddyfile && caddy run --config /etc/caddy/Caddyfile'
    volumes: [caddydata:/data]
    depends_on: [app]

volumes:
  pgdata:
  caddydata:
