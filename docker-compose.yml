# Local development: `docker compose up` starts the database, creates the
# tables + demo data (once), and runs the app on http://localhost:3000
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sahyatri
      POSTGRES_PASSWORD: sahyatri
      POSTGRES_DB: sahyatri
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sahyatri"]
      interval: 3s
      retries: 10

  # One-shot: creates tables and demo accounts, then exits.
  db-init:
    build:
      context: .
      target: builder
    command: sh -c "npx prisma db push && npx tsx prisma/seed.ts"
    environment:
      DATABASE_URL: postgresql://sahyatri:sahyatri@db:5432/sahyatri
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    ports: ["3000:3000"]
    environment:
      DATABASE_URL: postgresql://sahyatri:sahyatri@db:5432/sahyatri
      AUTH_SECRET: dev-only-secret-change-in-production
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

volumes:
  pgdata:
