# AWS App Runner configuration (source-based deploy from GitHub).
# Place this file at the repo root as apprunner.yaml, or point App Runner
# at deploy/aws/apprunner.yaml via "Use a configuration file".
version: 1.0
runtime: nodejs22
build:
  commands:
    build:
      - npm ci
      - npm run build
run:
  command: sh -c "npx prisma db push --skip-generate && node .next/standalone/server.js"
  network:
    port: 3000
  env:
    - name: NODE_ENV
      value: production
